name: Release

# Build + attach a Linux release tarball when a version tag is pushed (APP-5, S8.4).
# macOS/Windows are not built yet — the HTML viewer (wry/webkit2gtk) + keychain are Linux-only today
# (see packaging/README.md). Add matrix entries once those are ported.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # to upload assets to the GitHub Release

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so `git describe` sees the tag
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          # The Leptos frontend compiles to WASM and is embedded in the Tauri app, so the release
          # build needs the wasm target + the wasm-bindgen CLI (see build-ui.sh / package-linux.sh).
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Webview + GTK build deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          # MUST match the wasm-bindgen crate version in Cargo.lock; build-ui.sh enforces this.
          tool: wasm-bindgen-cli@0.2.125
      - name: Package (Linux x86_64)
        run: ./packaging/package-linux.sh "${GITHUB_REF_NAME}"
      - name: Attach the tarball to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      # --- Auto-update artifacts (APP-7, ADR-0013) --------------------------------------------------
      # A SIGNED AppImage + `latest.json` for the in-app updater feed. Runs ONLY when the maintainer's
      # signing key is configured as a secret; a release without it still ships the manual tarball above.
      # The maintainer must generate the keypair (`cargo tauri signer generate`), set these two secrets,
      # and put the public key in `tauri.conf.json`. See packaging/README.md + ADR-0013.
      - name: Detect signing key
        id: signing
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "have_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No TAURI_SIGNING_PRIVATE_KEY secret — skipping the auto-update (AppImage) artifacts; the tarball still shipped."
          fi
      - name: Install tauri-cli
        if: steps.signing.outputs.have_key == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli
      - name: AppImage build dep (tray lib)
        if: steps.signing.outputs.have_key == 'true'
        run: sudo apt-get install -y libayatana-appindicator3-dev
      - name: Build signed AppImage + updater signature
        if: steps.signing.outputs.have_key == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ./scripts/build-ui.sh --release
          # `createUpdaterArtifacts: true` (tauri.conf.json) makes this also emit the signed
          # `.AppImage.sig` next to the AppImage.
          cargo tauri build --bundles appimage
      - name: Generate latest.json
        if: steps.signing.outputs.have_key == 'true'
        run: ./packaging/make-latest-json.sh "${GITHUB_REF_NAME}"
      - name: Attach the updater artifacts
        if: steps.signing.outputs.have_key == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig
            latest.json
