name: Release

# Build + attach a Linux release tarball when a version tag is pushed (APP-5, S8.4).
# macOS/Windows are not built yet — the HTML viewer (wry/webkit2gtk) + keychain are Linux-only today
# (see packaging/README.md). Add matrix entries once those are ported.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # to upload assets to the GitHub Release

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so `git describe` sees the tag
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Webview + GTK build deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Package (Linux x86_64)
        run: ./packaging/package-linux.sh "${GITHUB_REF_NAME}"
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
