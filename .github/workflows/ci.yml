name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # nightly full mutation run on core

jobs:
  lint-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          # The Leptos frontend (geleit-ui, M9) compiles to wasm. It also builds for the host, which
          # is what lets clippy/test below cover it like any other crate — but a wasm-ONLY break
          # (e.g. a cfg(target_arch) path) would slip through, so we build it for wasm too.
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Webview + GTK build deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          # MUST match the wasm-bindgen crate version in Cargo.lock; build-ui.sh enforces this.
          tool: wasm-bindgen-cli@0.2.125
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build the Leptos frontend (wasm)
        run: ./scripts/build-ui.sh --release
      - name: Boundary (engine must not depend on UI)
        run: ./scripts/check-boundary.sh

  perf-budget:
    # Enforce the constitution P4 performance ceilings (M9, ADR-0012). Binary size is a HARD gate here.
    # Cold start + idle RSS are measured too, but WebKitGTK's first paint is unreliable on a headless
    # X server, so PERF_BUDGET_SOFT_DISPLAY=1 makes "couldn't reach first paint" a warning rather than a
    # failure — while a *measured* cold-start/RSS breach still fails. The hard enforcement of those two
    # is the release perf gate (scripts/perf-budget.sh on a real display, before tagging).
    #
    # Runs on PUSH to main (i.e. when a PR merges), NOT on every PR: a fat-LTO release build is ~10 min
    # and dominated the PR feedback loop. It still gates what actually lands on main, and the release
    # perf gate before tagging is the hard backstop. PRs stay fast (lint-test + deny + mutants, ~2 min).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Webview + GTK + xvfb
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev xvfb
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.125
      - name: Build release (wasm + app)
        run: ./scripts/build-ui.sh --release && cargo build --release -p geleit-app
      - name: Perf budget (P4 ceilings)
        run: PERF_BUDGET_SOFT_DISPLAY=1 xvfb-run -a --server-args="-screen 0 1400x1000x24" ./scripts/perf-budget.sh

  supply-chain:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.9 # pinned for reproducibility; bump deliberately
      - name: cargo deny check
        run: cargo deny check

  mutants-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Webview + GTK build deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Mutants (PR diff, report-only)
        continue-on-error: true # thresholds not gated yet (S0.1 spec)
        run: |
          # Ensure the base branch exists as a tracking ref so the diff resolves.
          git fetch --no-tags origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > pr.diff
          cargo mutants --in-diff pr.diff --package geleit-core --package geleit-platform --package geleit-store --package geleit-engine --package geleit-app

  mutants-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Mutants (full core, report-only)
        continue-on-error: true # thresholds not gated yet (S0.1 spec)
        run: cargo mutants --package geleit-core
