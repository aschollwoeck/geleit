name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # nightly full mutation run on core

jobs:
  lint-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Boundary (engine must not depend on UI)
        run: ./scripts/check-boundary.sh

  supply-chain:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.9 # pinned for reproducibility; bump deliberately
      - name: cargo deny check
        run: cargo deny check

  mutants-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Mutants (PR diff, report-only)
        continue-on-error: true # thresholds not gated yet (S0.1 spec)
        run: |
          # Ensure the base branch exists as a tracking ref so the diff resolves.
          git fetch --no-tags origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > pr.diff
          cargo mutants --in-diff pr.diff --package geleit-core --package geleit-platform --package geleit-engine

  mutants-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Mutants (full core, report-only)
        continue-on-error: true # thresholds not gated yet (S0.1 spec)
        run: cargo mutants --package geleit-core
