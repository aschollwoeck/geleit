# cargo-deny configuration (guidelines §6). Run: `cargo deny check`.
# Gates every dependency on security advisories, license compatibility, bans, and source.

[advisories]
version = 2
yanked = "deny"
# Add advisory IDs here only with a written justification.
ignore = [
    # gtk3-rs bindings (gtk/gdk/atk/… 0.18) are flagged **unmaintained** (not vulnerable). They are
    # pulled by `webkit2gtk` → `wry`, the only way to render HTML email on Linux (ADR-0001, S3.1);
    # webkit2gtk still requires GTK3. No GTK4 path exists for wry yet. Revisit when wry/webkit2gtk
    # move to GTK4. These are advisories, not exploitable vulnerabilities.
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error 1.0.4 — unmaintained, pulled transitively via the webview/gtk macro stack
    # (not vulnerable). Goes away when the gtk3 stack does.
    "RUSTSEC-2024-0370",
]

[licenses]
version = 2
# MIT-compatible permissive licenses for an MIT-licensed project — a forward-looking set so new
# deps don't churn this file. `cargo deny check` may warn "license not encountered" for entries
# not yet used by any dependency; that is informational and does not fail the check. Extend
# deliberately; never add a copyleft/incompatible license without a decision.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib", # foldhash (via rusqlite) — permissive, MIT-compatible
    "CDLA-Permissive-2.0", # webpki-roots — Mozilla CA root *data* (permissive data license)
    "BSL-1.0", # Boost license (a Slint/winit transitive dep) — permissive
    # MPL-2.0 (ammonia's servo HTML-parser deps: html5ever/markup5ever). File-level weak copyleft —
    # fine to *use* unmodified in our MIT app; only changes to those MPL files would need sharing.
    "MPL-2.0",
    # Slint is tri-licensed (GPL-3.0 OR Royalty-free OR commercial). We use it under the
    # ROYALTY-FREE license (ADR-0007), so we allow only that LicenseRef — GPL-3.0 is deliberately
    # NOT allowed, so the gate forbids accidentally taking the copyleft path. Attribution required.
    "LicenseRef-Slint-Royalty-free-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our internal crates are path deps (no version req); don't flag them as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
