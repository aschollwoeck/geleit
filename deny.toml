# cargo-deny configuration (guidelines §6). Run: `cargo deny check`.
# Gates every dependency on security advisories, license compatibility, bans, and source.

# Only the platforms GeleitMail actually ships on. Without this, cargo-deny scans EVERY target,
# including Android and iOS — and `tauri` declares `reqwest` under a mobile-only
# `[target.'cfg(any(target_os = "android", all(target_vendor = "apple", not(target_os = "macos"))))']`
# block. That tripped the no-egress ban (below) over a crate that can never be compiled into a
# desktop binary. Scoping the graph makes the ban mean what it claims: **no HTTP client in the app we
# ship**. If mobile is ever targeted, this list must grow — and reqwest's arrival there is then a
# deliberate, reviewed decision, not a silent one.
[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    # The Leptos frontend compiles to wasm. Nothing is wasm-ONLY in the tree today, so this changes
    # no result — it is cheap insurance for the day a `cfg(target_arch = "wasm32")` dependency lands
    # and would otherwise slip past the gate entirely.
    "wasm32-unknown-unknown",
]

[advisories]
version = 2
yanked = "deny"
# Add advisory IDs here only with a written justification.
ignore = [
    # --- M9 / ADR-0012: the Tauri + Leptos stack. All UNMAINTAINED, none vulnerable. They are
    # --- structural (the OS webview requires GTK3; Leptos's macros use these), with no alternative
    # --- short of not having a working, safe HTML renderer. Revisit when webkit2gtk/wry move to GTK4
    # --- and when Leptos drops the macro deps.
    #
    # gtk3-rs bindings (gtk/gdk/atk/… 0.18) — webkit2gtk (the OS webview, via Tauri→wry) still requires
    # GTK3; no GTK4 path exists yet. Unmaintained bindings, not exploitable vulnerabilities.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error 1.0.4 — unmaintained, pulled via the gtk/webview macro stack (not vulnerable).
    "RUSTSEC-2024-0370",
    # paste — unmaintained proc-macro. Path: leptos -> either_of -> paste.
    "RUSTSEC-2024-0436",
    # proc-macro-error2 — unmaintained. Path: leptos -> leptos_macro.
    "RUSTSEC-2026-0173",
    # unic-* — unmaintained Unicode tables. Path: tauri -> tauri-utils -> urlpattern -> unic-*.
    # BUILD-TIME ONLY (tauri-codegen), and they parse Tauri's own config, not untrusted input.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",

    # (quick-xml + ttf-parser ignores removed in S9.7 — they were pulled only by Slint/Blitz, now gone.)
]

[licenses]
version = 2
# MIT-compatible permissive licenses for an MIT-licensed project — a forward-looking set so new
# deps don't churn this file. `cargo deny check` may warn "license not encountered" for entries
# not yet used by any dependency; that is informational and does not fail the check. Extend
# deliberately; never add a copyleft/incompatible license without a decision.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib", # foldhash (via rusqlite) — permissive, MIT-compatible
    "0BSD", # BSD Zero-Clause (a lettre dep) — public-domain-equivalent, maximally permissive
    "CDLA-Permissive-2.0", # webpki-roots — Mozilla CA root *data* (permissive data license)
    "BSL-1.0", # Boost license (a Slint/winit transitive dep) — permissive
    # MPL-2.0 (ammonia's servo HTML-parser deps: html5ever/markup5ever). File-level weak copyleft —
    # fine to *use* unmodified in our MIT app; only changes to those MPL files would need sharing.
    "MPL-2.0",
    # (The Slint royalty-free LicenseRef allowance was removed in S9.7 — Slint is gone, ADR-0012.)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our internal crates are path deps (no version req); don't flag them as wildcards.
allow-wildcard-paths = true
# No-telemetry guard (PRIV-5, S8.5). The app's network egress is: IMAP/SMTP to the user's own server
# (a raw TCP+TLS socket), and — strictly opt-in, per message — fetching a message's remote images
# when the user clicks "Load images" (PRIV-2). That image fetch uses `ureq` (minimal, blocking,
# rustls), the ONLY allowed HTTP client; it never runs on its own. Ban every other general HTTP
# client and any telemetry/analytics SDK so none can be pulled in (silently shipping egress) without
# a deliberate, reviewed change here. If a future feature genuinely needs one, justify it.
deny = [
    # ureq was the only HTTP client, for the Slint app's opt-in image loading (remoteimg.rs). Both are
    # gone (M9/S9.7): "Load images" is now a CSP relaxation the OS webview honours, so the app has NO
    # HTTP client at all. Banned so one can't return unnoticed.
    { name = "ureq" },
    { name = "reqwest" },
    { name = "hyper" },
    { name = "isahc" },
    { name = "surf" },
    { name = "sentry" },
    { name = "opentelemetry" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
