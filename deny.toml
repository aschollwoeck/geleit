# cargo-deny configuration (guidelines §6). Run: `cargo deny check`.
# Gates every dependency on security advisories, license compatibility, bans, and source.

# Only the platforms GeleitMail actually ships on. Without this, cargo-deny scans EVERY target,
# including Android and iOS — and `tauri` declares `reqwest` under a mobile-only
# `[target.'cfg(any(target_os = "android", all(target_vendor = "apple", not(target_os = "macos"))))']`
# block. That tripped the no-egress ban (below) over a crate that can never be compiled into a
# desktop binary. Scoping the graph makes the ban mean what it claims: **no HTTP client in the app we
# ship**. If mobile is ever targeted, this list must grow — and reqwest's arrival there is then a
# deliberate, reviewed decision, not a silent one.
[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

[advisories]
version = 2
yanked = "deny"
# Add advisory IDs here only with a written justification.
ignore = [
    # gtk3-rs bindings (gtk/gdk/atk/… 0.18) are flagged **unmaintained** (not vulnerable). They are
    # pulled by `webkit2gtk` → `wry`, the only way to render HTML email on Linux (ADR-0001, S3.1);
    # webkit2gtk still requires GTK3. No GTK4 path exists for wry yet. Revisit when wry/webkit2gtk
    # move to GTK4. These are advisories, not exploitable vulnerabilities.
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error 1.0.4 — unmaintained, pulled transitively via the webview/gtk macro stack
    # (not vulnerable). Goes away when the gtk3 stack does.
    "RUSTSEC-2024-0370",

    # --- M9 / ADR-0012: the Tauri + Leptos stack. All UNMAINTAINED, none vulnerable. They are
    # --- structural (the OS webview requires GTK3; Leptos's macros use these), so there is no
    # --- alternative short of not having a working HTML renderer — which is the thing M9 exists to
    # --- fix. Revisit when wry/webkit2gtk move to GTK4 and when Leptos drops the macro deps.
    #
    # gtk-rs GTK3 bindings — webkit2gtk (the OS webview) still requires GTK3; no GTK4 path exists.
    # Path: tauri -> muda -> gtk. Supersedes the per-crate 2024-041x ignores below.
    "RUSTSEC-2024-0411",
    # paste — unmaintained proc-macro. Path: leptos -> either_of -> paste.
    "RUSTSEC-2024-0436",
    # proc-macro-error2 — unmaintained. Path: leptos -> leptos_macro.
    "RUSTSEC-2026-0173",
    # unic-* — unmaintained Unicode tables. Path: tauri -> tauri-utils -> urlpattern -> unic-*.
    # BUILD-TIME ONLY (tauri-codegen), and they parse Tauri's own config, not untrusted input.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",

    # --- Both of the following are pulled ONLY by Slint and Blitz, which M9 deletes (ADR-0012).
    # --- They are dormant-by-construction for us, and they disappear with S9.7's teardown.
    #
    # quick-xml 0.39 DoS advisories (quadratic start-tag scan; unbounded namespace allocation).
    # Path: Slint → winit → sctk-adwaita → smithay-client-toolkit → wayland-scanner → quick-xml.
    # `wayland-scanner` is a **build-time proc-macro** that parses the Wayland protocol XML shipped
    # with the crate — it never sees untrusted input, so neither DoS is reachable. We cannot upgrade
    # anyway: wayland-scanner's semver req holds quick-xml at 0.39 (fix is 0.41). Goes with Slint.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    #
    # ttf-parser 0.25 — unmaintained (not vulnerable). Path: Blitz → blitz-paint → anyrender_svg →
    # usvg → fontdb → ttf-parser. No safe upgrade exists. Goes with Blitz.
    "RUSTSEC-2026-0192",
]

[licenses]
version = 2
# MIT-compatible permissive licenses for an MIT-licensed project — a forward-looking set so new
# deps don't churn this file. `cargo deny check` may warn "license not encountered" for entries
# not yet used by any dependency; that is informational and does not fail the check. Extend
# deliberately; never add a copyleft/incompatible license without a decision.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib", # foldhash (via rusqlite) — permissive, MIT-compatible
    "0BSD", # BSD Zero-Clause (a lettre dep) — public-domain-equivalent, maximally permissive
    "CDLA-Permissive-2.0", # webpki-roots — Mozilla CA root *data* (permissive data license)
    "BSL-1.0", # Boost license (a Slint/winit transitive dep) — permissive
    # MPL-2.0 (ammonia's servo HTML-parser deps: html5ever/markup5ever). File-level weak copyleft —
    # fine to *use* unmodified in our MIT app; only changes to those MPL files would need sharing.
    "MPL-2.0",
    # Slint is tri-licensed (GPL-3.0 OR Royalty-free OR commercial). We use it under the
    # ROYALTY-FREE license (ADR-0007), so we allow only that LicenseRef — GPL-3.0 is deliberately
    # NOT allowed, so the gate forbids accidentally taking the copyleft path. Attribution required.
    "LicenseRef-Slint-Royalty-free-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our internal crates are path deps (no version req); don't flag them as wildcards.
allow-wildcard-paths = true
# No-telemetry guard (PRIV-5, S8.5). The app's network egress is: IMAP/SMTP to the user's own server
# (a raw TCP+TLS socket), and — strictly opt-in, per message — fetching a message's remote images
# when the user clicks "Load images" (PRIV-2). That image fetch uses `ureq` (minimal, blocking,
# rustls), the ONLY allowed HTTP client; it never runs on its own. Ban every other general HTTP
# client and any telemetry/analytics SDK so none can be pulled in (silently shipping egress) without
# a deliberate, reviewed change here. If a future feature genuinely needs one, justify it.
deny = [
    { name = "reqwest" },
    { name = "hyper" },
    { name = "isahc" },
    { name = "surf" },
    { name = "sentry" },
    { name = "opentelemetry" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
