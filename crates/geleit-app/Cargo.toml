[package]
name = "geleit-app"
version = "0.0.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
geleit-store = { version = "0.0.0", path = "../geleit-store" }
geleit-engine = { version = "0.0.0", path = "../geleit-engine" }
geleit-platform = { version = "0.0.0", path = "../geleit-platform" }
# unstable-winit-030 exposes the winit window so a sandboxed wry webview can embed as a child
# (S3.1, ADR-0001); webview embedding works on X11, with a graceful text fallback elsewhere.
slint = { version = "1.16.1", features = ["unstable-winit-030"] }
chrono = { version = "0.4.45", default-features = false, features = ["clock"] }
tokio = { version = "1", features = ["rt", "net", "time"] }
getrandom = "0.4.3"
wry = "0.55.1"
gtk = "0.18" # webkit2gtk's GTK; we init it and pump its loop under Slint's event loop

[features]
# Forwarded to the engine for self-signed dev servers; never enable in a release build.
dangerous-tls = ["geleit-engine/dangerous-tls"]

# The UI crate can't use the workspace `unsafe_code = "forbid"`: Slint's generated code carries
# `#[allow(unsafe_code)]`, and `forbid` cannot be overridden. We `deny` instead — still blocks
# unsafe in our own code (we never `#[allow]` it), but lets the generated UI shim compile.
[lints.rust]
unsafe_code = "deny"

[lints.clippy]
all = "warn"
