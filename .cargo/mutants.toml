# cargo-mutants configuration.
#
# We exclude network/transport/glue files whose mutants survive *spuriously* — the code they hold is
# integration glue verified by `#[ignore]`d live tests (which `cargo mutants` doesn't run) or by
# rendering/wiring that has no logic to mutate. The PURE logic each one is driven by is split into a
# sibling file that STAYS mutation-tested. `imap.rs`/`smtp.rs` are the archetype: reusable logic lives
# in `geleit-store`; the transport branches can't run without a live server.
exclude_globs = [
    "**/imap.rs",
    # smtp.rs is SMTP/TLS transport glue; the plaintext send is covered by an in-process sink test,
    # but the Implicit/StartTls + dangerous-TLS branches can't run in CI. Pure `envelope()` is unit-tested.
    "**/smtp.rs",
    # sync_actions.rs: thin blocking wrappers over the network IMAP/SMTP calls (star/seen/move/delete/
    # refresh/backfill/setup/send). Mutants survive spuriously — the network path can't run under
    # mutants. The pure validators (build_settings/build_smtp_settings) are unit-tested; the pure
    # resolvers they're driven by (resolve_folder, compose mapping) live in geleit-app/src/dto.rs.
    "**/geleit-engine/src/sync_actions.rs",
    # os_secret.rs is external keychain glue (Secret Service); verified by a live #[ignore] test.
    "**/geleit-platform/src/os_secret.rs",

    # --- geleit-app is the Tauri host (M9, ADR-0012). Its glue is excluded; the PURE logic lives in
    # --- geleit-app/src/dto.rs (DTO mapping, sender/subject fallbacks, folder ordering, folder roles,
    # --- compose mapping, email-date formatting) and STAYS mutation-tested.
    #
    # ipc.rs: blocking-store command glue (open the DB, run a query).
    "**/geleit-app/src/ipc.rs",
    # main.rs: window/protocol/handler wiring — no logic to mutate.
    "**/geleit-app/src/main.rs",
    # mailproto::handle: protocol glue needing a live Tauri UriSchemeContext; its pure helpers
    # (csp/placeholder/html_response) are unit-tested.
    "**/geleit-app/src/mailproto.rs",

    # --- geleit-ui is the Leptos frontend. Its view/IPC code can't run under mutants (no webview);
    # --- the pure display logic lives in geleit-ui/src/view.rs and STAYS covered.
    "**/geleit-ui/src/app.rs", # Leptos view declaration + event wiring
    "**/geleit-ui/src/api.rs", # IPC glue across the wasm boundary
    "**/geleit-ui/src/lib.rs", # wasm entrypoint only
]
