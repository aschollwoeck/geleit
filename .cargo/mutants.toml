# cargo-mutants configuration.
#
# We exclude network/transport/glue files whose mutants survive *spuriously* — the code they hold is
# integration glue verified by `#[ignore]`d live tests (which `cargo mutants` doesn't run) or by
# rendering/wiring that has no logic to mutate. The PURE logic each one is driven by is split into a
# sibling file that STAYS mutation-tested. `imap.rs`/`smtp.rs` are the archetype: reusable logic lives
# in `geleit-store`; the transport branches can't run without a live server.
exclude_globs = [
    "**/imap.rs",
    # smtp.rs is SMTP/TLS transport glue; the plaintext send is covered by an in-process sink test,
    # but the Implicit/StartTls + dangerous-TLS branches can't run in CI. Pure `envelope()` is unit-tested.
    "**/smtp.rs",
    # sync_actions.rs: thin blocking wrappers over the network IMAP/SMTP calls (star/seen/move/delete/
    # refresh/backfill/setup/send). Mutants survive spuriously — the network path can't run under
    # mutants. The pure validators (build_settings/build_smtp_settings) are unit-tested; the pure
    # resolvers they're driven by (resolve_folder, compose mapping) live in geleit-app/src/dto.rs.
    "**/geleit-engine/src/sync_actions.rs",
    # os_secret.rs is external keychain glue (Secret Service); verified by a live #[ignore] test.
    "**/geleit-platform/src/os_secret.rs",
    # os_notify.rs is the same shape: a D-Bus call to the desktop's notification service. Nothing here
    # can be caught without a live desktop (`examples/notify_once.rs` is how it's checked by hand). The
    # `Notifier` trait, the fake, and every decision about WHAT to say stay mutation-tested.
    "**/geleit-platform/src/os_notify.rs",
    # tray.rs: a single D-Bus NameHasOwner probe for a StatusNotifierWatcher; needs a live session bus,
    # nothing here can be caught without one. The decision it drives (gate close-to-tray) is glue.
    "**/geleit-platform/src/tray.rs",

    # --- geleit-app is the Tauri host (M9, ADR-0012). Its glue is excluded; the PURE logic lives in
    # --- geleit-app/src/dto.rs (DTO mapping, sender/subject fallbacks, folder ordering, folder roles,
    # --- compose mapping, email-date formatting) and STAYS mutation-tested.
    #
    # ipc.rs: blocking-store command glue (open the DB, run a query).
    "**/geleit-app/src/ipc.rs",
    # main.rs: window/protocol/handler wiring — no logic to mutate.
    "**/geleit-app/src/main.rs",
    # idle.rs: the IMAP IDLE watcher — a long-lived tokio task per account needing a live server; its
    # only decision (reconnect backoff) is trivial and its effect (wake the scheduler) is glue.
    "**/geleit-host/src/worker/idle.rs",
    # update.rs: auto-update glue over tauri-plugin-updater — needs a live feed + a real signed artifact;
    # the version comparison is the plugin's, so there's no logic of ours to mutate here.
    "**/geleit-app/src/update.rs",
    # tray.rs: the system-tray icon — needs a live AppHandle + a desktop tray (libayatana-appindicator3);
    # its callbacks (show/hide the window, quit) are single-line glue with no logic to mutate.
    "**/geleit-app/src/tray.rs",
    # scheduler.rs: the background-sync loop — a tokio task needing a live AppHandle, an IMAP server
    # and a clock; nothing here can run under mutants. Its DECISIONS (backoff, sweep verdict, the
    # per-account retry cadence) are split into `schedule.rs`, which STAYS mutation-tested.
    "**/geleit-host/src/worker/scheduler.rs",
    # backfill.rs: the background full-mailbox backfill loop — same shape as scheduler.rs (a tokio task
    # over a live AppHandle + IMAP server, driving `run_backfill`); its only real logic is the
    # single-flight guard, which is unit-tested on `AppState` in ipc.rs.
    "**/geleit-host/src/worker/backfill.rs",
    # mailproto::handle: protocol glue needing a live Tauri UriSchemeContext; its pure helpers
    # (csp/placeholder/html_response) are unit-tested.
    "**/geleit-app/src/mailproto.rs",

    # --- geleit-host is the host-agnostic command core (ADR-0014) — the former geleit-app/src/ipc.rs.
    # commands.rs: the same blocking-store command glue ipc.rs held (open the DB, run a query, hit the
    # network); its mutants survive spuriously for the same reason. The PURE logic it's driven by lives
    # in geleit-host/src/dto.rs + snooze.rs, which STAY mutation-tested. (The `AppState` single-flight /
    # sync-lock guards are unit-tested in commands.rs's own tests.)
    "**/geleit-host/src/commands.rs",

    # --- geleit-server is the localhost web host (ADR-0014). Its glue mirrors the Tauri host's.
    # main.rs: axum route/static/CSP wiring — no logic to mutate.
    "**/geleit-server/src/main.rs",
    # dispatch.rs: the command-name → geleit-host routing match (the analogue of Tauri's
    # generate_handler!); pure plumbing, and the logic it forwards to is tested in geleit-host.
    "**/geleit-server/src/dispatch.rs",
    # shell.rs: the Shell impl — a broadcast send per event; single-line glue.
    "**/geleit-server/src/shell.rs",
    # auth.rs: the HTTP Basic middleware — request/response glue that can't run without a live request
    # flow. Its pure helpers (`request_password` header parse, `constant_time_eq`) are unit-tested in
    # the file's own `#[cfg(test)]` module.
    "**/geleit-server/src/auth.rs",

    # --- geleit-ui is the Leptos frontend. Its view/IPC code can't run under mutants (no webview);
    # --- the pure display logic lives in geleit-ui/src/view.rs and STAYS covered.
    "**/geleit-ui/src/app.rs", # Leptos view declaration + event wiring
    "**/geleit-ui/src/api.rs", # IPC glue across the wasm boundary
    "**/geleit-ui/src/lib.rs", # wasm entrypoint only
]
